name: Update profile README

on:
  workflow_dispatch:
  schedule:
    # Runs at 09:00 Asia/Shanghai.
    - cron: "0 1 * * *"

permissions:
  contents: write

concurrency:
  group: update-profile-readme
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Collect GitHub facts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/collect_profile_data.py --owner VectorPeak --out github-facts.json

      - name: Render README
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          PROFILE_TRANSLATION_MODEL: qwen-plus
        run: python scripts/render_profile_readme.py --data profile-data.json --facts github-facts.json --out README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update profile README"
          git push origin HEAD:main
