name: Update profile README

on:
  workflow_dispatch:
  schedule:
    # Runs at 07:17 Asia/Shanghai (23:17 UTC), away from the top-of-hour queue.
    - cron: "17 23 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-profile-readme
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.WORKFLOW_PUSH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Collect GitHub facts
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_PUSH_PAT }}
        run: python scripts/collect_profile_data.py --owner VectorPeak --out github-facts.json

      - name: Render README
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          PROFILE_TRANSLATION_MODEL: qwen-plus
        run: python scripts/render_profile_readme.py --data profile-data.json --facts github-facts.json --out README.md

      - name: Commit changes
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PUSH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && exit 0
          BRANCH="automation/update-profile-readme"
          git checkout -B "$BRANCH"
          git commit -m "chore: update profile README"
          git push --force-with-lease origin "$BRANCH"
          EXISTING_PR="$(gh pr list --base main --head "VectorPeak:$BRANCH" --state open --json number --jq '.[0].number')"
          if [ -z "$EXISTING_PR" ]; then
            PR_URL="$(gh pr create --base main --head "$BRANCH" --title "chore: update profile README" --body "Automated profile README update.")"
            PR_NUMBER="$(gh pr view "$PR_URL" --json number --jq '.number')"
          else
            PR_NUMBER="$EXISTING_PR"
            gh pr comment "$EXISTING_PR" --body "Updated automated README refresh branch."
          fi
          gh pr merge "$PR_NUMBER" --squash --delete-branch --subject "chore: update profile README" --body "Automated profile README update."
