name: Update profile README

on:
  workflow_dispatch:
  schedule:
    # Runs at 07:00 Asia/Shanghai (23:00 UTC).
    - cron: "0 23 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-profile-readme
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Collect GitHub facts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/collect_profile_data.py --owner VectorPeak --out github-facts.json

      - name: Render README
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          PROFILE_TRANSLATION_MODEL: qwen-plus
        run: python scripts/render_profile_readme.py --data profile-data.json --facts github-facts.json --out README.md

      - name: Commit changes
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PUSH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && exit 0
          BRANCH="update-profile-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "chore: update profile README"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" --title "chore: update profile README" --body "Automated profile README update."
          gh pr merge --merge --admin "$BRANCH"